version: '3.8'

services:
  # Redis Database Server (Berjalan di STB 1)
  redis:
    image: redis:7-alpine
    container_name: roblox-redis
    restart: always
    command: redis-server --requirepass password
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - roblox-network

  # Backend REST API & Cron Jobs (Berjalan di STB 1)
  backend:
    build: ./backend
    container_name: roblox-backend
    restart: always
    env_file:
      - ./backend/.env.server1
    ports:
      - "7000:7000"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - roblox-network

  # Frontend Dashboard App (Berjalan di STB 1)
  frontend:
    build: ./frontend
    container_name: roblox-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=https://roblox-api.backendify.my.id # Domain backend publik Anda
    depends_on:
      - backend
    networks:
      - roblox-network

# NOTE: PostgreSQL dijalankan di STB 2 (192.168.1.11) secara mandiri.
# Jika Anda ingin menjalankan PostgreSQL di STB 2 menggunakan Docker, jalankan compose berikut di STB 2:
# ------------------------------------------------------------------------------
# services:
#   postgres:
#     image: postgres:15-alpine
#     container_name: roblox-postgres
#     restart: always
#     environment:
#       - POSTGRES_USER=admin
#       - POSTGRES_PASSWORD=password
#       - POSTGRES_DB=roblox
#     ports:
#       - "5432:5432"
#     volumes:
#       - postgres-data:/var/lib/postgresql/data
# ------------------------------------------------------------------------------

volumes:
  redis-data:
    driver: local

networks:
  roblox-network:
    driver: bridge
